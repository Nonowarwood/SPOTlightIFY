name: Build and deploy

on:
  schedule:
    - cron: "0 6,14,22 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      - name: Checkout private data repo
        uses: actions/checkout@v4
        with:
          repository: Nonowarwood/spotlightify-data
          token: ${{ secrets.DATA_REPO_PAT }}
          path: data-source

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Aggregate raw data into public stats
        run: npm run aggregate -- --input data-source --output public/data

      - name: Build site
        env:
          PUBLIC_PASSPHRASE_HASH: ${{ secrets.PUBLIC_PASSPHRASE_HASH }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
